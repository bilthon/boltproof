      <h1>boltproof — verify Lightning payments locally</h1>
      <p>boltproof confirms whether a Bitcoin Lightning payment is real, entirely in your browser. Paste a BOLT11 invoice and the preimage (the payment secret) and it checks two things: that the invoice's signature is valid, and that <code>sha256(preimage)</code> equals the payment hash inside the invoice.</p>
      <h2>What it proves</h2>
      <p>Only the party who actually paid receives the preimage. If it matches the invoice's payment hash and the invoice signature checks out, the payment provably happened — no bank, receipt, or third party required.</p>
      <h2>Who it's for</h2>
      <p>Merchants and freelancers confirming a customer really paid a Lightning invoice, and Bitcoin/Lightning developers verifying BOLT11 invoices and preimage/payment-hash mechanics.</p>
      <h2>Private by design</h2>
      <p>No account, no server, no data stored — every check runs client-side. JavaScript is required to use the tool.</p>
